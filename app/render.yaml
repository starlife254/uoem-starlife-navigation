# render.yaml
services:
  - type: web
    name: embu-ai-navigation
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm && python -m nltk.downloader punkt stopwords
    startCommand: gunicorn -k eventlet -w 1 'app:app'
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: embu-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.9.16

databases:
  - name: embu-db
    databaseName: embu_navigation
    plan: free
    postgresMajorVersion: 15