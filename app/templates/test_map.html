<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Simple test map
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Loading test map...');
            
            // University of Embu coordinates
            const embuLat = -0.5075;
            const embuLon = 37.4575;
            
            // Create map
            const map = L.map('map').setView([embuLat, embuLon], 17);
            
            // Add OpenStreetMap tile layer
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // Add a test marker
            L.marker([embuLat, embuLon])
                .addTo(map)
                .bindPopup('University of Embu<br>Test Location')
                .openPopup();
            
            console.log('Map loaded successfully!');
        });
    </script>
</body>
</html>
