<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface - University of Embu Navigation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-fixes.css') }}">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
      .chat-container {
    width: 90%;
    max-width: 800px;
    height: 90vh;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    margin: 0 auto;
    position: relative;
}

.chat-header {
    flex-shrink: 0; /* Prevent header from shrinking */
    background: linear-gradient(135deg, #2c3e50, #3498db);
    color: white;
    padding: 15px 20px;
    text-align: center;
}

.chat-messages {
    flex: 1 1 auto; /* Grow and shrink as needed */
    padding: 20px;
    overflow-y: auto;
    background: #f8f9fa;
    min-height: 0; /* Important for flexbox scrolling */
}

.chat-input-container {
    flex-shrink: 0; /* Prevent input from shrinking */
    padding: 15px 20px;
    background: white;
    border-top: 1px solid #e9ecef;
    display: flex;
    gap: 10px;
    width: 100%;
    box-sizing: border-box;
}

.suggestions {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 20px;
    background: #f8f9fa;
    border-top: 1px solid #e9ecef;
}

/* Mobile-specific fixes */
@media (max-width: 768px) {
    .chat-container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }
    
    .chat-messages {
        padding: 15px;
        max-height: calc(100vh - 140px); /* Adjust based on header+input height */
    }
    
    .chat-input-container {
        padding: 12px 15px;
        position: sticky;
        bottom: 0;
        background: white;
        z-index: 10;
    }
    
    .suggestions {
        position: sticky;
        bottom: 70px; /* Height of input container */
        background: #f8f9fa;
        z-index: 9;
        padding: 10px 15px;
    }
    
    .chat-input {
        font-size: 16px; /* Prevent zoom on mobile */
        padding: 10px 14px;
    }
    
    .send-btn, .voice-btn {
        width: 44px;
        height: 44px;
        min-width: 44px; /* Ensure buttons don't shrink */
    }
}
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .user .message-content {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .message-time {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 5px;
            text-align: right;
        }
        
        .user .message-time {
            color: rgba(255,255,255,0.7);
        }
        
        .confidence-indicator {
            font-size: 0.7rem;
            color: #28a745;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .building-found {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .building-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #28a74520;
            color: #28a745;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .chat-input:focus {
            border-color: #007bff;
        }
        
        .send-btn, .voice-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .send-btn:hover, .voice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,123,255,0.3);
        }
        
        .voice-btn {
            background: linear-gradient(135deg, #28a745, #1e7e34);
        }
        
        .voice-btn.listening {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #dc3545, #c82333);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        
        .suggestion-btn {
            padding: 8px 15px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .suggestion-btn:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 10px 16px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .welcome-message {
            text-align: center;
            padding: 30px 20px;
        }
        
        .welcome-icon {
            font-size: 48px;
            color: #3498db;
            margin-bottom: 15px;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            
            .message-content {
                max-width: 85%;
            }
            /* Fix for mobile blurring */
.modal-open, .modal-open body {
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
}
/* Fix for mobile touch interactions */
.modal-backdrop {
    pointer-events: none !important; /* Allow clicks to pass through */
    background-color: rgba(0, 0, 0, 0.3) !important;
}

.navbar, 
.navigation-controls,
.bottom-nav,
.menu-container {
    z-index: 1050 !important;
    position: relative;
    pointer-events: auto !important; /* Ensure menus are clickable */
}

/* Ensure the main content doesn't block menus */
.main-content, 
.map-container,
.chat-container {
    pointer-events: auto;
}

/* Fix for any full-screen overlays */
.overlay,
.modal,
.dropdown-menu {
    pointer-events: auto !important;
    z-index: 1060 !important;
}

/* Prevent body scroll when menu is open */
body.menu-open {
    overflow: hidden;
    position: fixed;
    width: 100%;
    height: 100%;
}

/* Ensure the menu itself is clickable */
.menu-open .navbar,
.menu-open .navigation-controls {
    pointer-events: auto !important;
}

/* Ensure no backdrop blur affects navigation */
.modal-backdrop {
    background-color: rgba(0, 0, 0, 0.5) !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
}

/* Keep navigation elements above backdrop */
.navbar, .bottom-nav, .navigation-controls {
    z-index: 1060 !important;
    position: relative;
}

/* Prevent body scroll when modal is open */
body.modal-open {
    overflow: hidden;
    position: fixed;
    width: 100%;
}

/* Fix for any blur filters */
* {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
}
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1><i class="fas fa-robot"></i> AI Campus Navigator</h1>
            <p>University of Embu - Natural Language Navigation Assistant</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will appear here -->
            <div class="welcome-message">
                <div class="welcome-icon">
                    <i class="fas fa-university"></i>
                </div>
                <h2>Welcome to AI-Powered Campus Navigation!</h2>
                <p style="margin-top: 10px; color: #666;">
                    Ask me anything about University of Embu locations. For example:<br>
                    "Where is the library?" or "How do I get to the administration building?"
                </p>
            </div>
        </div>
        
        <div class="suggestions" id="suggestions">
            <button class="suggestion-btn" onclick="sendMessage('Where is the library?')">
                <i class="fas fa-book"></i> Library
            </button>
            <button class="suggestion-btn" onclick="sendMessage('How do I get to administration?')">
                <i class="fas fa-building"></i> Administration
            </button>
            <button class="suggestion-btn" onclick="sendMessage('Find the cafeteria')">
                <i class="fas fa-utensils"></i> Cafeteria
            </button>
            <button class="suggestion-btn" onclick="sendMessage('Show me computer labs')">
                <i class="fas fa-desktop"></i> Computer Labs
            </button>
        </div>
        
        <div class="chat-input-container">
            <input type="text" 
                   class="chat-input" 
                   id="chatInput" 
                   placeholder="Type your question about campus locations..."
                   onkeypress="handleKeyPress(event)">
            
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceInput()">
                <i class="fas fa-microphone"></i>
            </button>
            
            <button class="send-btn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
    
    <script>
        // DOM Elements
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const suggestions = document.getElementById('suggestions');
        
        // State
        let isListening = false;
        let recognition = null;
        
        // Check for Web Speech API support
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        // Initialize voice recognition if supported
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                chatInput.value = transcript;
                sendMessage();
            };
            
            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                showMessage('System', `Voice recognition error: ${event.error}`, false);
                stopListening();
            };
            
            recognition.onend = function() {
                stopListening();
            };
        } else {
            voiceBtn.style.display = 'none';
            console.log('Speech recognition not supported');
        }
        
        // Functions
        function toggleVoiceInput() {
            if (!recognition) {
                showMessage('System', 'Voice input is not supported in your browser.', false);
                return;
            }
            
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }
        
        function startListening() {
            try {
                recognition.start();
                isListening = true;
                voiceBtn.classList.add('listening');
                voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
                showMessage('System', 'Listening... Speak now.', false);
            } catch (error) {
                console.error('Error starting speech recognition:', error);
            }
        }
        
        function stopListening() {
            isListening = false;
            voiceBtn.classList.remove('listening');
            voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function sendMessage(predefinedMessage = null) {
            const message = predefinedMessage || chatInput.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addMessage('user', message);
            
            // Clear input
            if (!predefinedMessage) {
                chatInput.value = '';
            }
            
            // Show typing indicator
            showTypingIndicator();
            
            // Hide suggestions
            suggestions.style.display = 'none';
            
            // Send to AI backend
            fetch('/api/ai/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query: message })
            })
            .then(response => response.json())
            .then(data => {
                // Remove typing indicator
                removeTypingIndicator();
                
                if (data.success) {
                    // Add bot response
                    addMessage('bot', data.response, data);
                    
                    // If building found, show option to navigate
                    if (data.building_details) {
                        setTimeout(() => {
                            addNavigationOption(data.building_details);
                        }, 500);
                    }
                    
                    // Show suggestions again
                    setTimeout(() => {
                        suggestions.style.display = 'flex';
                    }, 1000);
                    
                } else {
                    addMessage('bot', data.error || 'Sorry, I encountered an error.', data);
                }
            })
            .catch(error => {
                removeTypingIndicator();
                addMessage('bot', 'Network error. Please try again.', {});
                console.error('Error:', error);
            });
        }
        
        function addMessage(sender, content, data = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let messageHTML = `
                <div class="message-content">
                    ${content}
                    <div class="message-time">${time}</div>
            `;
            
            // Add confidence indicator for bot messages with data
            if (sender === 'bot' && data) {
                if (data.intent_confidence && data.intent_confidence > 0) {
                    messageHTML += `
                        <div class="confidence-indicator">
                            <i class="fas fa-brain"></i>
                            AI Confidence: ${Math.round(data.intent_confidence * 100)}%
                        </div>
                    `;
                }
                
                if (data.building && data.building_confidence) {
                    messageHTML += `
                        <div class="confidence-indicator">
                            <i class="fas fa-building"></i>
                            Building match: ${data.building} (${Math.round(data.building_confidence * 100)}%)
                        </div>
                    `;
                }
            }
            
            messageHTML += `</div>`;
            
            messageDiv.innerHTML = messageHTML;
            chatMessages.appendChild(messageDiv);
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addNavigationOption(buildingDetails) {
            const navDiv = document.createElement('div');
            navDiv.className = 'message bot';
            navDiv.innerHTML = `
                <div class="message-content">
                    <div class="building-found">
                        <div class="building-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div style="flex: 1;">
                            <strong>${buildingDetails.name}</strong><br>
                            <small>${buildingDetails.type_name}</small>
                        </div>
                        <button onclick="navigateToBuilding(${buildingDetails.id})" 
                                style="padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
                            <i class="fas fa-route"></i> Navigate
                        </button>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(navDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function navigateToBuilding(buildingId) {
            // This would open the main navigation interface
            addMessage('bot', `Opening navigation to building ${buildingId}...`, {});
            
            // In a real implementation, this would switch to the map view
            // For now, just show a message
            setTimeout(() => {
                addMessage('system', `Navigation to building ${buildingId} would open in main map interface.`, {});
            }, 1000);
        }
        
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        function showMessage(sender, content, isUser = true) {
            addMessage(isUser ? 'user' : 'bot', content);
        }
        
        // Initialize with welcome message
        window.onload = function() {
            // Auto-scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };
    </script>
</body>
</html>
